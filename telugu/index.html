<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>తెలుగు వర్ణమాల</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family: Arial;
margin:0;
background:#f5f7fb;
text-align:center;
}

header{
background:#2563eb;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.controls{
margin-top:10px;
}

button{
padding:12px 16px;
margin:6px;
border:none;
border-radius:10px;
font-size:16px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.letter{
font-size:120px;
margin-top:20px;
}

.word{
font-size:28px;
margin:10px;
}

img{
max-width:200px;
margin-top:10px;
border-radius:10px;
}

.grid{
margin-top:20px;
padding:10px;
}

.grid span{
display:inline-block;
font-size:28px;
background:white;
padding:10px;
margin:6px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
cursor:pointer;
}

footer{
margin-top:40px;
padding:20px;
background:#eef2f7;
font-size:14px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
padding:20px;
margin:10% auto;
width:80%;
max-width:400px;
border-radius:10px;
}

</style>
</head>

<body>

<header>

తెలుగు వర్ణమాల

<div class="controls">

<button onclick="togglePicture()" id="picBtn">
🖼 Picture: ON
</button>

<button onclick="toggleAuto()" id="autoBtn">
🔊 Auto Sound: OFF
</button>

<button onclick="showHelp()">
How to Use
</button>

<button onclick="installApp()">
Install App
</button>

</div>

</header>


<div class="letter" id="letter">అ</div>

<img id="picture" src="images/amma.jpg">

<div class="word" id="word">అమ్మ</div>


<div>

<button onclick="speakLetter()">🔊 Letter</button>
<button onclick="speakWord()">🔊 Word</button>

</div>

<div>

<button onclick="nextLetter()">Next</button>
<button onclick="randomLetter()">Random</button>

</div>


<h3>అచ్చులు</h3>
<div class="grid" id="vowels"></div>

<h3>హల్లులు</h3>
<div class="grid" id="consonants"></div>


<div class="modal" id="helpModal">

<div class="modal-content">

<h3>How Parents Can Use</h3>

<p>
1. Show the letter to the child.<br>
2. Ask the child to say the letter.<br>
3. Tap 🔊 to hear pronunciation.<br>
4. Turn off picture to test memory.<br>
</p>

<button onclick="closeHelp()">Close</button>

</div>

</div>


<footer>

⭐ Star on GitHub

<br>

<a href="https://github.com/ung-varun/Mini-apps">
github.com/ung-varun/Mini-apps
</a>

<br><br>

Built by <b>Varun Ungurala</b>

</footer>


<script>

let showPicture=true
let autoSound=false
let deferredPrompt

const vowels=[

{l:"అ",w:"అమ్మ",img:"amma.jpg"},
{l:"ఆ",w:"ఆవు",img:"aavu.jpg"},
{l:"ఇ",w:"ఇల్లు",img:"illu.jpg"},
{l:"ఈ",w:"ఈగ",img:"eega.jpg"},
{l:"ఉ",w:"ఉడుత",img:"uduta.jpg"},
{l:"ఊ",w:"ఊయల",img:"ooyala.jpg"},
{l:"ఋ",w:"ఋషి",img:"rushi.jpg"},
{l:"ఎ",w:"ఎలుక",img:"eluka.jpg"},
{l:"ఏ",w:"ఏనుగు",img:"eenugu.jpg"},
{l:"ఐ",w:"ఐదు",img:"aidu.jpg"},
{l:"ఒ",w:"ఒంటె",img:"onte.jpg"},
{l:"ఓ",w:"ఓడ",img:"oda.jpg"},
{l:"ఔ",w:"ఔషధం",img:"oushadham.jpg"},
{l:"అం",w:"అంకం",img:"ankam.jpg"},
{l:"అః",w:"అః",img:"aha.jpg"}

]

const consonants=[

{l:"క",w:"కలం",img:"kalam.jpg"},
{l:"ఖ",w:"ఖడ్గం",img:"khadgam.jpg"},
{l:"గ",w:"గడియారం",img:"gadiyam.jpg"},
{l:"ఘ",w:"ఘంట",img:"ghanta.jpg"},
{l:"చ",w:"చెట్టు",img:"chettu.jpg"},
{l:"జ",w:"జలము",img:"jalamu.jpg"},
{l:"ట",w:"టమోటా",img:"tomato.jpg"},
{l:"డ",w:"డబ్బు",img:"dabbu.jpg"},
{l:"త",w:"తల",img:"tala.jpg"},
{l:"ద",w:"దనం",img:"dhanam.jpg"},
{l:"ప",w:"పండు",img:"pandu.jpg"},
{l:"బ",w:"బంతి",img:"banthi.jpg"},
{l:"మ",w:"మామిడి",img:"mamidi.jpg"},
{l:"య",w:"యజ్ఞం",img:"yagnam.jpg"},
{l:"ర",w:"రథం",img:"ratham.jpg"},
{l:"ల",w:"లత",img:"latha.jpg"},
{l:"వ",w:"వనం",img:"vanam.jpg"},
{l:"శ",w:"శంఖం",img:"shankam.jpg"},
{l:"స",w:"సముద్రం",img:"samudram.jpg"},
{l:"హ",w:"హంస",img:"hamsa.jpg"},
{l:"ళ",w:"పళ్లు",img:"pallu.jpg"},
{l:"క్ష",w:"క్షత్రియ",img:"kshatriya.jpg"},
{l:"ఱ",w:"ఱాము",img:"ramu.jpg"}

]

let all=[...vowels,...consonants]

let index=0

function show(){

let d=all[index]

document.getElementById("letter").innerText=d.l
document.getElementById("word").innerText=d.w
document.getElementById("picture").src="images/"+d.img

document.getElementById("picture").style.display=
showPicture?"block":"none"

if(autoSound)speakLetter()

}

function nextLetter(){

index=(index+1)%all.length
show()

}

function randomLetter(){

index=Math.floor(Math.random()*all.length)
show()

}

function speakLetter(){

let msg=new SpeechSynthesisUtterance(all[index].l)
msg.lang="te-IN"
speechSynthesis.speak(msg)

}

function speakWord(){

let msg=new SpeechSynthesisUtterance(all[index].w)
msg.lang="te-IN"
speechSynthesis.speak(msg)

}

function togglePicture(){

showPicture=!showPicture

document.getElementById("picBtn").innerText=
showPicture?"🖼 Picture: ON":"🖼 Picture: OFF"

show()

}

function toggleAuto(){

autoSound=!autoSound

document.getElementById("autoBtn").innerText=
autoSound?"🔊 Auto Sound: ON":"🔊 Auto Sound: OFF"

}

function build(){

let v=document.getElementById("vowels")
let c=document.getElementById("consonants")

vowels.forEach(x=>{

let s=document.createElement("span")
s.innerText=x.l
s.onclick=()=>{

index=all.indexOf(x)
show()

}

v.appendChild(s)

})

consonants.forEach(x=>{

let s=document.createElement("span")
s.innerText=x.l
s.onclick=()=>{

index=all.indexOf(x)
show()

}

c.appendChild(s)

})

}

function showHelp(){

document.getElementById("helpModal").style.display="block"

}

function closeHelp(){

document.getElementById("helpModal").style.display="none"

}

window.addEventListener("beforeinstallprompt",e=>{

e.preventDefault()
deferredPrompt=e

})

function installApp(){

if(deferredPrompt){

deferredPrompt.prompt()

}

}

build()
show()

</script>

</body>
</html>
