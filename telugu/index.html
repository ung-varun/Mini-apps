}

  .media-box{

display:flex;

justify-content:center;
margin-top:10px;
}

.media-box img{

max-width:180px;
position:absolute;
}

.emoji{
font-size:90px;
}

.media-box{
height:200px;
display:flex;
align-items:center;
justify-content:center;

margin-top:10px;
}

.media-box img{
max-height:180px;
max-width:180px;

}

.emoji{

}  

</style>

</head>


<body>


<header>

తెలుగు వర్ణమాల

<br>

<button onclick="togglePicture()" id="picBtn">
🖼 Picture ON
</button>

<button onclick="toggleAuto()" id="autoBtn">
🔊 Auto Sound OFF
</button>

<button onclick="showHelp()">
How to Use
</button>

</header>


<div class="letter" id="letter"></div>

<div class="media-box">

<img id="picture">

<div class="emoji" id="emoji"></div>

</div>


<div class="word" id="word"></div>


<div>

<button onclick="speakLetter()">🔊 Letter</button>

<button onclick="speakWord()">🔊 Word</button>

<button onclick="nextLetter()">Next</button>

<button onclick="randomLetter()">Random</button>

</div>


<h3>అచ్చులు</h3>

<div id="vowels"></div>


<h3>హల్లులు</h3>

<div id="consonants"></div>



<div class="modal" id="helpModal">

<div class="modal-content">

<h3>How Parents Can Use</h3>

<p>

1. Show the letter to the child.<br><br>

2. Ask the child to say the letter.<br><br>

3. Press 🔊 to hear the correct pronunciation.<br><br>

4. Turn OFF picture to test memory.

</p>

<button onclick="closeHelp()">Close</button>

</div>

</div>

<script>


let showPicture=true
let autoSound=false


const vowels=[

{l:"అః",w:"అహం",img:"aham.png",emoji:"🗣️"}

]


const consonantRows=[

{l:"క",w:"కలం",img:"kalam.png",emoji:"🖊️"},

],

[
{l:"చ",w:"చెట్టు",img:"chettu.png",emoji:"🌳"},
{l:"ఛ",w:"ఛత్రం",img:"chatram.png",emoji:"⛱️"},
{l:"జ",w:"జలము",img:"jalamu.png",emoji:"💧"},
{l:"ఝ",w:"ఝాన్సీ",img:"jhansi.png",emoji:"🏰"},
{l:"ఞ",w:"ఞానం",img:"",emoji:"📚"}
],

[
{l:"ట",w:"టమోటా",img:"tomato.png",emoji:"🍅"},
{l:"ఠ",w:"ఠాకూర్",img:"thakur.png",emoji:"👑"},
{l:"డ",w:"డబ్బు",img:"dabbu.png",emoji:"💰"},
{l:"ఢ",w:"ఢమరు",img:"dhamaru.png",emoji:"🥁"},

],

[

],

[
{l:"ప",w:"పండు",img:"pandu.png",emoji:"🍎"},

],

[
{l:"య",w:"యజ్ఞం",img:"yagnam.png",emoji:"🔥"},

],

{l:"హ",w:"హంస",img:"hamsa.png",emoji:"🦢"}
],

[
{l:"ళ",w:"పళ్లు",img:"pallu.png",emoji:"🦷"},
{l:"క్ష",w:"క్షత్రియ",img:"kshatriya.png",emoji:"🛡️"},
{l:"ఱ",w:"ఱాము",img:"ramu.png",emoji:"👦"}
]

]


let all=[...vowels]

consonantRows.forEach(r=>all.push(...r))

let index=0



function show(){

let d=all[index]

document.getElementById("letter").innerText=d.l
document.getElementById("word").innerText=d.w

let img=document.getElementById("picture")
let emoji=document.getElementById("emoji")

emoji.innerText=""

if(d.img){

img.src="images/"+d.img
img.style.visibility=showPicture?"visible":"hidden"

img.onerror=function(){

img.style.visibility="hidden"
emoji.innerText=d.emoji

}

}else{

img.style.visibility="hidden"
emoji.innerText=d.emoji

}

if(autoSound) speakLetter()

}


function nextLetter(){

index=(index+1)%all.length
show()

}


function randomLetter(){

index=Math.floor(Math.random()*all.length)
show()

}


function speakLetter(){

let msg=new SpeechSynthesisUtterance(all[index].l)
msg.lang="te-IN"
speechSynthesis.speak(msg)

}


function speakWord(){

let msg=new SpeechSynthesisUtterance(all[index].w)
msg.lang="te-IN"
speechSynthesis.speak(msg)

}


function togglePicture(){

showPicture=!showPicture

document.getElementById("picBtn").innerText=

showPicture?"🖼 Picture ON":"🖼 Picture OFF"

show()

}


function toggleAuto(){

autoSound=!autoSound

document.getElementById("autoBtn").innerText=

autoSound?"🔊 Auto Sound ON":"🔊 Auto Sound OFF"

}


function buildGrid(){

let v=document.getElementById("vowels")

let row1=document.createElement("div")
row1.className="grid-row"

let row2=document.createElement("div")
row2.className="grid-row"

vowels.forEach((x,i)=>{

let s=document.createElement("span")
s.innerText=x.l

s.onclick=()=>{

index=i
show()

}

if(i<8){
row1.appendChild(s)
}else{
row2.appendChild(s)
}

})

v.appendChild(row1)
v.appendChild(row2)


let c=document.getElementById("consonants")

consonantRows.forEach((rowData,rowIndex)=>{

let row=document.createElement("div")
row.className="grid-row"

rowData.forEach(x=>{

let s=document.createElement("span")
s.innerText=x.l

s.onclick=()=>{

index=all.indexOf(x)
show()

}

row.appendChild(s)

})

c.appendChild(row)

})

}


function showHelp(){

document.getElementById("helpModal").style.display="block"

}

function closeHelp(){

document.getElementById("helpModal").style.display="none"

}


buildGrid()
show()

</script>

</body>

</html>
