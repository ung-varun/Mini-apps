<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Apps Hub</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

h1{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,200px);
gap:20px;
justify-content:center;
margin-top:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

a{
text-decoration:none;
color:black;
font-size:18px;
}
</style>

</head>

<body>

<h1>🎮 Varun Mini Apps</h1>

<div class="grid">

<div class="card">
<a href="telugu">🔤 Telugu Letters</a>
</div>

<div class="card">
<a href="rps">✊ Rock Paper Scissors</a>
</div>

<div class="card">
<a href="math">🧠 Kids Math</a>
</div>

<div class="card">
<a href="sound">🔊 Letter Sounds</a>
</div>

</div>

</body>
</html>
