<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Varun Mini Apps</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
padding:30px;
font-size:28px;
font-weight:bold;
}

.sub{
color:#94a3b8;
margin-top:-15px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,180px);
gap:25px;
justify-content:center;
padding:40px;
}

.app{
background:#1e293b;
padding:30px;
border-radius:16px;
transition:0.25s;
cursor:pointer;
}

.app:hover{
transform:translateY(-6px);
background:#334155;
}

.icon{
font-size:40px;
margin-bottom:10px;
}

a{
text-decoration:none;
color:white;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>
🚀 Varun Mini Apps
</header>

<div class="sub">
Small playful apps and experiments
</div>

<div class="container">

<a href="telugu">
<div class="app">
<div class="icon">🔤</div>
Telugu Letters
</div>
</a>

<a href="rps">
<div class="app">
<div class="icon">✊</div>
Rock Paper Scissors
</div>
</a>

<a href="math">
<div class="app">
<div class="icon">🧠</div>
Kids Math
</div>
</a>

<a href="sounds">
<div class="app">
<div class="icon">🔊</div>
Letter Sounds
</div>
</a>

<a href="flashcards">
<div class="app">
<div class="icon">🃏</div>
Flash Cards
</div>
</a>

</div>

<footer>
Built by <b>Varun Ungurala</b> • Ungurala Solutions Pvt Ltd
</footer>

</body>
</html>
